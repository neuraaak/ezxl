# ///////////////////////////////////////////////////////////////
# MKDOCS CONFIGURATION
# ///////////////////////////////////////////////////////////////

site_name: ezxl Documentation
site_description: Comprehensive documentation for the ezxl Python library, covering installation, usage, API reference, and more.
site_author: Neuraaak
site_url: https://neuraaak.github.io/ezxl/
repo_url: https://github.com/neuraaak/ezxl
repo_name: neuraaak/ezxl
edit_uri: edit/main/docs/

strict: true

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

# ///////////////////////////////////////////////////////////////
# THEME
# ///////////////////////////////////////////////////////////////

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  # logo: assets/logo.png       # Uncomment when docs/assets/logo.png exists
  # favicon: assets/favicon.ico  # Uncomment when docs/assets/favicon.ico exists

# ///////////////////////////////////////////////////////////////
# NAVIGATION
# ///////////////////////////////////////////////////////////////

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guides:
      - guides/index.md
      - Configuration: guides/configuration.md
      - Development: guides/development.md
      - Testing: guides/testing.md
  - Concepts:
      - concepts/index.md
  - API Reference:
      - api/index.md
      - Auto-Generated:
          - api/reference/index.md
          - Win32com backends: api/reference/win32com-backends.md
          - Pywinauto backends: api/reference/pywinauto-backends.md
  - CLI Reference:
      - cli/index.md
  - Examples:
      - examples/index.md
  - Architecture: architecture.md
  - Coverage: coverage.md
  - Changelog: changelog.md

# ///////////////////////////////////////////////////////////////
# PLUGINS
# ///////////////////////////////////////////////////////////////

plugins:
  - search
  - section-index
  - coverage:
      page_path: coverage
      html_report_dir: htmlcov
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_section_style: table
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_signature_annotations: true
            separate_signature: true
            signature_crossrefs: true
            members_order: source
            group_by_category: true
            merge_init_into_class: true
            filters:
              - "!^_"
              - "^__init__$"

# ///////////////////////////////////////////////////////////////
# MARKDOWN EXTENSIONS
# ///////////////////////////////////////////////////////////////

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.betterem
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      check_paths: true
      base_path: [".", "docs"]
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: neuraaak
      repo: ezxl
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - abbr
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
      toc_depth: 3

# ///////////////////////////////////////////////////////////////
# EXTRA
# ///////////////////////////////////////////////////////////////

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/neuraaak/ezxl
      name: GitHub Repository
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/ezxl/
      name: PyPI Package

extra_css:
  - stylesheets/extra.css

copyright: >
  Copyright &copy; 2026 Neuraaak -
  <a href="https://github.com/neuraaak/ezxl/blob/main/LICENSE">MIT License</a>
